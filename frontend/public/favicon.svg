<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- The Touchstone mark: the one verdigris accent as the tile, with a cream T
       rubbed across it. Kept to a single bold letter so it stays unmistakable
       (not "IT") and legible down to 16px on any browser tab. -->
  <rect width="32" height="32" rx="7" fill="#0b6e61"/>
  <rect x="6.5" y="8.5" width="19" height="3.8" rx="1.4" fill="#fafbf7"/>
  <rect x="14.1" y="8.5" width="3.8" height="16" rx="1.4" fill="#fafbf7"/>
</svg>
