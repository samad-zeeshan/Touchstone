name: keep-warm

# Pings the Render backend's /health route on a schedule so the free instance
# does not spin down (~15 min idle), removing the cold start on the first visit.
# Public repo, so the Actions minutes used here are free.

on:
  schedule:
    # Every 10 minutes. GitHub may delay scheduled runs under load, so this is
    # comfortably under Render's ~15 min sleep window.
    - cron: "*/10 * * * *"
  # Lets you trigger a run by hand from the Actions tab to test it.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 60 https://touchstone-api-7z81.onrender.com/health
